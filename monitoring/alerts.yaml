apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ledger-api-alerts
  labels:
    app.kubernetes.io/name: ledger-api
    release: prometheus
spec:
  groups:
    - name: ledger-api.availability
      rules:
        - alert: ledger-apiHighErrorRate
          expr: sum(rate(http_requests_total{service="ledger-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="ledger-api"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: Commerce
          annotations:
            summary: ledger-api has elevated 5xx responses.
            runbook_url: docs/RUNBOOK.md
        - alert: ledger-apiUnavailable
          expr: up{job="ledger-api"} == 0
          for: 5m
          labels:
            severity: critical
            team: Commerce
          annotations:
            summary: ledger-api is not being scraped or is unavailable.
            runbook_url: docs/RUNBOOK.md
